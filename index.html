<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用英文每日靜心練習</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23f9a8c9'/%3E%3Cstop offset='50%25' stop-color='%23f06090'/%3E%3Cstop offset='100%25' stop-color='%23c04878'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='30' fill='%23fff5f8' stroke='%23f9c8d8' stroke-width='2'/%3E%3Ctext x='32' y='44' font-size='38' text-anchor='middle' font-family='serif' fill='url(%23g)'%3E✿%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   ROOT — 完全對齊參考檔案的暖米色系
════════════════════════════════════════ */
:root {
  --bg:       #fcf4e8;
  --dot-bg:   #eadab0;
  --card-bg:  #fffefb;
  --card-border: #e7d8c4;
  --card-shadow: #ebd5be;

  --pink:     #f08a80;
  --pink-dk:  #ce685e;
  --pink-lt:  #fae1dc;
  --pink-bd:  #f4c8ce;

  --green:    #7dbf8c;
  --green-dk: #5a9e6e;
  --green-lt: #e1eedc;

  --blue:     #7aaecc;
  --blue-dk:  #5080a0;
  --blue-lt:  #e1ecf5;

  --yellow:   #f5c842;
  --yellow-lt:#fcf5e5;
  --yellow-bd:#e9dcbf;

  --peach:    #e9aa9b;
  --peach-dk: #ce7a65;

  --tan:      #c4a882;
  --brown:    #7a5840;

  --text:     #5e412f;
  --text2:    #825e43;
  --text3:    #a88060;
  --muted:    #c0a080;

  --shadow:   rgba(139,115,85,0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

/* ════════════════════════════════════════
   BODY — 暖米色點點背景（完全匹配參考）
════════════════════════════════════════ */
body {
  font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
  background-color: var(--bg);
  background-image: radial-gradient(var(--dot-bg) 1.2px, transparent 1.2px);
  background-size: 28px 28px;
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 捲軸 ── */
::-webkit-scrollbar { width: 12px; }
::-webkit-scrollbar-track { background: #f4ecda; border-radius: 12px; }
::-webkit-scrollbar-thumb { background: #d9beab; border-radius: 12px; border: 3px solid #f4ecda; }

/* ════════════════════════════════════════
   FELT CARD — 乾淨厚邊框（同參考檔案）
   ✦ 完全不使用任何 SVG filter，文字清晰
════════════════════════════════════════ */
.felt-card {
  background: var(--card-bg);
  border: 6px solid var(--card-border);
  border-radius: 36px;
  padding: 28px 26px;
  margin-bottom: 24px;
  position: relative;
  overflow: hidden;
  box-shadow:
    inset 0 -8px 0 var(--card-shadow),
    0 12px 28px -5px var(--shadow),
    0 8px 12px -6px var(--shadow);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
}
.felt-card:hover {
  transform: translateY(-3px);
  box-shadow:
    inset 0 -8px 0 var(--card-shadow),
    0 18px 36px -5px rgba(139,115,85,0.18),
    0 14px 18px -6px rgba(139,115,85,0.18);
}

/* ════════════════════════════════════════
   WRAPPER
════════════════════════════════════════ */
.wrapper {
  max-width: 860px;
  margin: 0 auto;
  padding: 36px 18px 70px;
  position: relative;
  z-index: 10;
}

/* ════════════════════════════════════════
   HEADER
════════════════════════════════════════ */
header {
  text-align: center;
  margin-bottom: 28px;
}
header h1 {
  font-family: 'Fredoka', sans-serif;
  font-size: clamp(1.9rem, 6vw, 3rem);
  font-weight: 700;
  color: var(--text);
  letter-spacing: 0.02em;
  line-height: 1.2;
}
.flower-grad {
  background: linear-gradient(135deg, #f9a8c9 0%, #f06090 50%, #c04878 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: inline-block;
  filter: drop-shadow(0 1px 2px rgba(240,96,144,0.25));
}
header p {
  font-size: 0.95rem;
  color: var(--text3);
  margin-top: 6px;
  font-weight: 400;
  letter-spacing: 0.04em;
}

/* ════════════════════════════════════════
   BUTTONS — woolen style（同參考 woolen-btn）
════════════════════════════════════════ */
.controls {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 24px;
}

.btn {
  font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
  font-weight: 600;
  font-size: 0.95rem;
  border: none;
  cursor: pointer;
  border-radius: 22px;
  padding: 10px 20px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.1s ease;
  outline: none;
  letter-spacing: 0.02em;
  /* woolen 立體感：下邊深色陰影邊 */
  border-bottom-width: 5px;
  border-bottom-style: solid;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}
.btn:hover { filter: brightness(1.05); transform: translateY(-1px); }
.btn:active { transform: translateY(3px); border-bottom-width: 2px; }

.btn-mauve  { background: #c06080; color: #fff; border-bottom-color: #8b3a56; }
.btn-pink   { background: var(--pink); color: #fff; border-bottom-color: var(--pink-dk); }
.btn-blue   { background: var(--blue); color: #fff; border-bottom-color: var(--blue-dk); }
.btn-green  { background: var(--green); color: #fff; border-bottom-color: var(--green-dk); }
.btn-rose   { background: #e07080; color: #fff; border-bottom-color: #b04060; }
.btn-peach  { background: var(--peach); color: #fff; border-bottom-color: var(--peach-dk); }
.btn-tan    { background: var(--tan); color: #fff; border-bottom-color: var(--brown); }

/* ════════════════════════════════════════
   CARD HEADER
════════════════════════════════════════ */
.card-header {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 3px dashed #d5b99e;
}
.card-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.35rem;
  font-weight: 600;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ════════════════════════════════════════
   SELECT
════════════════════════════════════════ */
select {
  background: #fdf8f2;
  border: 2px solid var(--card-border);
  color: var(--text);
  border-radius: 12px;
  padding: 7px 10px;
  font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  outline: none;
  cursor: pointer;
}

/* ════════════════════════════════════════
   SENTENCE ROWS
════════════════════════════════════════ */
.sentence-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 10px;
  border-radius: 14px;
  margin-bottom: 4px;
  transition: background 0.2s;
  border-bottom: 1.5px solid rgba(215,185,158,0.25);
}
.sentence-row:last-child { border-bottom: none; }
.sentence-row:hover { background: rgba(240,218,200,0.3); }
.sentence-row.playing {
  background: linear-gradient(90deg, #fae8dc, rgba(240,210,195,0.4));
  border-left: 4px solid var(--pink-dk);
  padding-left: 12px;
  border-bottom-color: transparent;
}

.sentence-num {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--peach-dk);
  min-width: 28px;
  margin-top: 2px;
}
.sentence-text { flex: 1; }
.sentence-main {
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1.65;
}
.sentence-phonetic {
  font-size: 0.84rem;
  color: var(--text3);
  font-style: italic;
  margin-top: 3px;
  display: none;
  font-family: 'Noto Sans TC', sans-serif;
}
.sentence-phonetic.visible { display: block; }

/* 中文翻譯（雙語模式時顯示在英文下方） */
.sentence-zh {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text2);
  margin-top: 4px;
  padding-left: 2px;
  border-left: 3px solid var(--pink);
  padding-left: 8px;
  line-height: 1.6;
  font-family: 'Noto Sans TC', sans-serif;
}

/* 情境標題英譯 */
.scenario-title-en {
  font-size: 0.82em;
  font-weight: 400;
  opacity: 0.72;
  margin-left: 6px;
  font-family: 'Fredoka', sans-serif;
  letter-spacing: 0.02em;
}

/* ════════════════════════════════════════
   PLAY BUTTON — 🌸 花朵造型
════════════════════════════════════════ */
.play-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.15s ease;
  background: transparent;
  position: relative;
  padding: 0;
}
.play-btn:hover { transform: scale(1.15) rotate(10deg); }
.play-btn:active { transform: scale(0.92) rotate(-5deg); }

/* 播放中：花朵持續旋轉 */
@keyframes flower-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.play-btn.spinning .flower-bg {
  animation: flower-spin 2s linear infinite;
  transform-origin: center;
}
.play-btn.spinning:hover { transform: scale(1.1); }

/* 花朵背景用 SVG，三角形播放符號疊在上面 */
.play-btn .flower-bg {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
}
.play-btn .play-tri {
  position: relative;
  z-index: 2;
  width: 0; height: 0;
  border-style: solid;
  border-width: 6px 0 6px 11px;
  margin-left: 2px;
}
.play-btn.green .play-tri { border-color: transparent transparent transparent #5a9e6e; }
.play-btn.blue  .play-tri { border-color: transparent transparent transparent #c04878; }

/* ════════════════════════════════════════
   SCENARIO TITLE TAG
════════════════════════════════════════ */
.scenario-title {
  font-family: 'Fredoka', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--brown);
  background: var(--yellow-lt);
  display: inline-block;
  padding: 5px 16px;
  border-radius: 9999px;
  margin-bottom: 10px;
  margin-top: 8px;
  border: 2px solid var(--yellow-bd);
  box-shadow: 0 2px 0 rgba(180,140,60,0.18);
}

/* ════════════════════════════════════════
   DOT TRACKER
════════════════════════════════════════ */
.dot-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(14px, 1fr));
  gap: 5px;
}
.dot {
  width: 100%;
  aspect-ratio: 1;
  background: #f0d8cc;
  border-radius: 50%;
  transition: all 0.3s ease;
}
.dot.done {
  background: var(--pink);
  box-shadow: 0 1px 4px rgba(200,100,100,0.3);
}
.dot.today {
  border: 2px solid var(--pink-dk);
  transform: scale(1.25);
  box-shadow: 0 0 6px rgba(200,80,100,0.35);
}

/* ════════════════════════════════════════
   CHECK-IN BUTTON
════════════════════════════════════════ */
.checkin-wrap { display: flex; justify-content: center; margin-top: 24px; }
#checkinBtn {
  font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
  font-size: 1.1rem;
  font-weight: 600;
  padding: 13px 34px;
  background: var(--pink);
  color: #fff;
  border: none;
  border-bottom: 6px solid var(--pink-dk);
  border-radius: 22px;
  cursor: pointer;
  box-shadow: 0 4px 12px rgba(206,104,94,0.25);
  transition: all 0.1s ease;
  display: flex; align-items: center; gap: 8px;
  letter-spacing: 0.02em;
}
#checkinBtn:hover { filter: brightness(1.05); transform: translateY(-1px); }
#checkinBtn:active { transform: translateY(4px); border-bottom-width: 2px; }
#checkinBtn.done {
  background: var(--green);
  border-bottom-color: var(--green-dk);
  box-shadow: 0 4px 12px rgba(90,158,110,0.25);
}

/* ════════════════════════════════════════
   TRACKER TOP BAR
════════════════════════════════════════ */
.tracker-top {
  display: flex; flex-wrap: wrap;
  align-items: center; gap: 10px;
  justify-content: flex-end;
}
.tracker-top label { font-weight: 600; font-size: 0.88rem; color: var(--text2); }
input[type=date] {
  background: #fdf8f2;
  border: 2px solid var(--card-border);
  border-radius: 12px;
  padding: 6px 10px;
  font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
  font-size: 0.88rem;
  font-weight: 500;
  color: var(--text);
  outline: none;
  cursor: pointer;
}
.streak-badge {
  background: #fdf8f2;
  border: 2px solid var(--card-border);
  border-radius: 9999px;
  padding: 5px 14px;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--text2);
  box-shadow: 0 2px 0 rgba(0,0,0,0.06);
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #8b3a56;
  color: #fff;
  padding: 12px 28px;
  border-radius: 22px;
  font-weight: 600; font-size: 0.95rem;
  opacity: 0;
  transition: all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 9999; white-space: nowrap;
  box-shadow: 0 4px 0 rgba(0,0,0,0.18), 0 6px 20px rgba(140,58,86,0.28);
  font-family: 'Fredoka', 'Noto Sans TC', sans-serif;
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ════════════════════════════════════════
   DECORATIONS — 乾淨 drop-shadow，不用 displacement
════════════════════════════════════════ */
.deco {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  filter: drop-shadow(1px 2px 4px rgba(160,80,100,0.18));
  /* ✦ 不加任何 displacement filter，裝飾圖形邊緣清晰 */
}
@keyframes float-a {
  0%,100% { transform: translateY(0) rotate(-4deg); }
  50%      { transform: translateY(-9px) rotate(4deg); }
}
@keyframes float-b {
  0%,100% { transform: translateY(0) rotate(6deg); }
  50%      { transform: translateY(-11px) rotate(-4deg); }
}
@keyframes float-c {
  0%,100% { transform: translateY(0) rotate(0deg) scale(1); }
  50%      { transform: translateY(-7px) rotate(8deg) scale(1.04); }
}
.deco.bow    { animation: float-a 5s ease-in-out infinite; }
.deco.clover { animation: float-b 6.5s ease-in-out infinite; }
.deco.flower { animation: float-c 7s ease-in-out infinite 1s; }
.deco.star   { animation: float-a 4.5s ease-in-out infinite 0.5s; }

/* 隱藏內部捲軸 */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style:none; scrollbar-width:none; }

@media (max-width:640px) { .deco { display:none; } .felt-card { padding:20px 14px; } }
</style>
</head>

  WOOL OVERLAY — 光影質感（同參考檔案，不影響文字）
════════════════════════════════════ -->

  <filter id="felt-noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>

      <feDistantLight azimuth="45" elevation="60"/>

  </filter>

const mindfulnessPool = [
  {en:"Take a deep breath in, and let it go.",zh:"深呼吸，然後吐氣放鬆。",ipa:"/teɪk ə diːp brɛθ ɪn, ænd lɛt ɪt ɡoʊ/",pinyin:"shēn hū xī, rán hòu tǔ qì fàng sōng."},
  {en:"Right now, you don't have to do anything.",zh:"現在這一刻，你什麼都不必做。",ipa:"/raɪt naʊ, ju doʊnt hæv tu du ˈɛniˌθɪŋ/",pinyin:"xiàn zài zhè yī kè, nǐ shén me dōu bù bì zuò."},
  {en:"You don't have to worry about tomorrow.",zh:"你不必為了明天而擔憂。",ipa:"/ju doʊnt hæv tu ˈwɜri əˈbaʊt təˈmɑˌroʊ/",pinyin:"nǐ bù bì wèi le míng tiān ér dān yōu."},
  {en:"Look around you. Feel the air on your skin.",zh:"看看四周。感受空氣拂過你的皮膚。",ipa:"/lʊk əˈraʊnd ju. fiːl ði ɛr ɑn jʊr skɪn/",pinyin:"kàn kàn sì zhōu. gǎn shòu kōng qì fú guò nǐ de pí fū."},
  {en:"Listen to the quiet in this room.",zh:"聆聽這個房間裡的寧靜。",ipa:"/ˈlɪsən tu ðə ˈkwaɪət ɪn ðɪs ruːm/",pinyin:"líng tīng zhè ge fáng jiān lǐ de níng jìng."},
  {en:"The world is always rushing, but you can stop.",zh:"世界總是很匆忙，但你可以停下來。",ipa:"/ðə wɜrld ɪz ˈɔlˌweɪz ˈrʌʃɪŋ, bʌt ju kæn stɑp/",pinyin:"shì jiè zǒng shì hěn cōng máng, dàn nǐ kě yǐ tíng xià lái."},
  {en:"Your worth is not in your to-do list.",zh:"你的價值不在於待辦清單。",ipa:"/jʊr wɜrθ ɪz nɑt ɪn jʊr tu-du lɪst/",pinyin:"nǐ de jià zhí bù zài yú dài bàn qīng dān."},
  {en:"You are enough just by being here.",zh:"光是存在於此，你就已經足夠了。",ipa:"/ju ɑr ɪˈnʌf dʒʌst baɪ ˈbiɪŋ hɪr/",pinyin:"guāng shì cún zài yú cǐ, nǐ jiù yǐ jīng zú gòu le."},
  {en:"Let your shoulders drop. Let your mind be still.",zh:"放下肩膀。讓你的心安靜下來。",ipa:"/lɛt jʊr ˈʃoʊldərz drɑp. lɛt jʊr maɪnd bi stɪl/",pinyin:"fàng xià jiān bǎng. ràng nǐ de xīn ān jìng xià lái."},
  {en:"Everything is okay. You are safe.",zh:"一切都很好。你很安全。",ipa:"/ˈɛvriˌθɪŋ ɪz ˌoʊˈkeɪ. ju ɑr seɪf/",pinyin:"yī qiè dōu hěn hǎo. nǐ hěn ān quán."},
  {en:"And you are doing great.",zh:"而且你做得非常棒。",ipa:"/ænd ju ɑr ˈduɪŋ ɡreɪt/",pinyin:"ér qiě nǐ zuò de fēi cháng bàng."},
  {en:"Stay in this moment for just a little longer.",zh:"在這個當下，再多停留一會兒吧。",ipa:"/steɪ ɪn ðɪs ˈmoʊmənt fɔr dʒʌst ə ˈlɪtəl ˈlɔŋɡər/",pinyin:"zài zhè ge dāng xià, zài duō tíng liú yī huǐ ér ba."},
  {en:"Be gentle with yourself today.",zh:"今天，對自己溫柔一點。",ipa:"/bi ˈdʒɛntəl wɪð jʊərˈsɛlf təˈdeɪ/",pinyin:"jīn tiān, duì zì jǐ wēn róu yī diǎn."},
  {en:"You have survived all of your hard days.",zh:"你已經熬過了所有艱難的日子。",ipa:"/ju hæv sərˈvaɪvd ɔl ʌv jʊr hɑrd deɪz/",pinyin:"nǐ yǐ jīng áo guò le suǒ yǒu jiān nán de rì zi."},
  {en:"It is okay to rest when you are tired.",zh:"累的時候，休息是沒關係的。",ipa:"/ɪt ɪz ˌoʊˈkeɪ tu rɛst wɛn ju ɑr ˈtaɪərd/",pinyin:"lèi de shí hòu, xiū xí shì méi guān xì de."},
  {en:"Let go of what you cannot control.",zh:"放下那些你無法控制的事物。",ipa:"/lɛt ɡoʊ ʌv wʌt ju ˈkænɑt kənˈtroʊl/",pinyin:"fàng xià nà xiē nǐ wú fǎ kòng zhì de shì wù."},
  {en:"Your feelings are valid and important.",zh:"你的感受是合理且重要的。",ipa:"/jʊr ˈfilɪŋz ɑr ˈvæləd ænd ɪmˈpɔrtənt/",pinyin:"nǐ de gǎn shòu shì hé lǐ qiě zhòng yào de."},
  {en:"Breathe in peace, breathe out stress.",zh:"吸進平靜，呼出壓力。",ipa:"/brið ɪn pis, brið aʊt strɛs/",pinyin:"xī jìn píng jìng, hū chū yā lì."},
  {en:"Today is a new beginning.",zh:"今天是一個新的開始。",ipa:"/təˈdeɪ ɪz ə nu bɪˈɡɪnɪŋ/",pinyin:"jīn tiān shì yī gè xīn de kāi shǐ."},
  {en:"You are surrounded by love.",zh:"你被愛所包圍著。",ipa:"/ju ɑr səˈraʊndəd baɪ lʌv/",pinyin:"nǐ bèi ài suǒ bāo wéi zhe."},
  {en:"Close your eyes and just breathe for a moment.",zh:"閉上眼睛，先靜靜地呼吸一下。",ipa:"/kloʊz jʊr aɪz ænd dʒʌst brið fɔr ə ˈmoʊmənt/",pinyin:"bì shàng yǎn jīng, xiān jìng jìng de hū xī yī xià."},
  {en:"You don't need to be perfect to be worthy.",zh:"你不需要完美才有價值。",ipa:"/ju doʊnt nid tu bi ˈpɜrfɪkt tu bi ˈwɜrði/",pinyin:"nǐ bù xū yào wán měi cái yǒu jià zhí."},
  {en:"Small steps still move you forward.",zh:"小步伐仍然讓你向前邁進。",ipa:"/smɔl stɛps stɪl muv ju ˈfɔrwərd/",pinyin:"xiǎo bù fá réng rán ràng nǐ xiàng qián mài jìn."},
  {en:"It's okay to not have all the answers.",zh:"沒有所有答案，是沒關係的。",ipa:"/ɪts ˌoʊˈkeɪ tu nɑt hæv ɔl ðə ˈænsərz/",pinyin:"méi yǒu suǒ yǒu dá àn, shì méi guān xì de."},
  {en:"You have the strength to get through this.",zh:"你有足夠的力量度過這一切。",ipa:"/ju hæv ðə strɛŋθ tu ɡɛt θru ðɪs/",pinyin:"nǐ yǒu zú gòu de lì liàng dù guò zhè yī qiē."},
  {en:"Slow down. You don't have to rush.",zh:"放慢腳步，你不必那麼趕。",ipa:"/sloʊ daʊn. ju doʊnt hæv tu rʌʃ/",pinyin:"fàng màn jiǎo bù, nǐ bù bì nà me gǎn."},
  {en:"You are allowed to take up space in this world.",zh:"你有權利在這個世界中佔據自己的位置。",ipa:"/ju ɑr əˈlaʊd tu teɪk ʌp speɪs ɪn ðɪs wɜrld/",pinyin:"nǐ yǒu quán lì zài zhè ge shì jiè zhōng zhàn jù zì jǐ de wèi zhì."},
  {en:"This moment is yours. Treasure it.",zh:"這個時刻是你的，好好珍惜它。",ipa:"/ðɪs ˈmoʊmənt ɪz jʊrz. ˈtrɛʒər ɪt/",pinyin:"zhè ge shí kè shì nǐ de, hǎo hǎo zhēn xī tā."},
  {en:"Let kindness begin with yourself.",zh:"讓善意從自己開始。",ipa:"/lɛt ˈkaɪndnɪs bɪˈɡɪn wɪð jʊərˈsɛlf/",pinyin:"ràng shàn yì cóng zì jǐ kāi shǐ."},
  {en:"One breath at a time. That's all you need.",zh:"一次一個呼吸，這就是你所需要的一切。",ipa:"/wʌn brɛθ æt ə taɪm. ðæts ɔl ju nid/",pinyin:"yī cì yī gè hū xī, zhè jiù shì nǐ suǒ xū yào de yī qiē."},
  {en:"You matter more than you know.",zh:"你的重要性遠超過你所知道的。",ipa:"/ju ˈmætər mɔr ðæn ju noʊ/",pinyin:"nǐ de zhòng yào xìng yuǎn chāo guò nǐ suǒ zhī dào de."},

   STATE
════════════════════════════════════════ */
let isEnglish=true, showPhonetics=false;
let synth=window.speechSynthesis, voices=[];
let dailySentences=[], currentlyPlayingIndex=-1;
let currentlyPlayingScenario=null;
let seedOffset=0, scenarioSeedOffset=0, isPlayingAll=false;

// 防重複歷史紀錄：記住已出現過的句子 index（跨批次）
let mindfulnessHistory=[];   // 已用過的 mindfulnessPool index
let scenarioHistory={};      // {情境index: [已用過的句子 index]}

const $ = id => document.getElementById(id);
const sentenceListEl    = $('sentenceList');
const scenarioListEl    = $('scenarioList');

/* ════════════════════════════════════════
   HELPERS
════════════════════════════════════════ */
function seededRandom(s){const x=Math.sin(s++)*10000;return x-Math.floor(x);}
const getDayOfYear=()=>{const n=new Date(),s=new Date(n.getFullYear(),0,0);return Math.floor((n-s)/864e5);};
function getTodayString(){const tz=(new Date()).getTimezoneOffset()*60000;return (new Date(Date.now()-tz)).toISOString().split('T')[0];}
function getDaysDiff(d1,d2){const a=new Date(d1),b=new Date(d2);a.setHours(0,0,0,0);b.setHours(0,0,0,0);return Math.floor((b-a)/864e5);}
function showToast(msg){toastMsg.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),3000);}

/* ════════════════════════════════════════
   VOICE — 預設美式英語
════════════════════════════════════════ */
function populateVoices(){voices=synth.getVoices();filterVoices();}
if(speechSynthesis.onvoiceschanged!==undefined) speechSynthesis.onvoiceschanged=populateVoices;

function pickDefaultUSVoice(list){
  // 優先順序: Google US English > 任何 en-US > 任何 en
  return list.find(v=>v.name.toLowerCase().includes('google')&&v.lang.toLowerCase()==='en-us')
      || list.find(v=>v.lang.toLowerCase()==='en-us')
      || list.find(v=>v.lang.toLowerCase().startsWith('en-us'))
      || list.find(v=>v.lang.toLowerCase().startsWith('en'))
      || null;
}

function filterVoices(){
  voiceSelect.innerHTML='';
  const prefix = isEnglish ? 'en' : 'zh';
  let filtered = voices.filter(v=>v.lang.toLowerCase().startsWith(prefix));

  if(isEnglish){
    // 排序：en-US 排最前
    filtered.sort((a,b)=>{
      const aUS = a.lang.toLowerCase().startsWith('en-us') ? 0 : 1;
      const bUS = b.lang.toLowerCase().startsWith('en-us') ? 0 : 1;
      if(aUS!==bUS) return aUS-bUS;
      // en-US 內部：Google 排最前
      const aG = a.name.toLowerCase().includes('google') ? 0 : 1;
      const bG = b.name.toLowerCase().includes('google') ? 0 : 1;
      return aG-bG;
    });
  }

  if(!filtered.length){voiceSelect.innerHTML='<option>預設系統發音</option>';return;}

  let defaultVoice = isEnglish ? pickDefaultUSVoice(filtered) : null;

  filtered.forEach(v=>{
    const o=document.createElement('option');
    let label = v.name;
    if(v.name.toLowerCase().includes('google')) label='🌟 '+label;
    if(v.lang.toLowerCase().startsWith('en-us')) label='🇺🇸 '+label;
    o.textContent=label;
    o.value=v.voiceURI;
    if(defaultVoice && v.voiceURI===defaultVoice.voiceURI) o.selected=true;
    voiceSelect.appendChild(o);
  });
}

function speak(text,cb){
  if(synth.speaking) synth.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=0.85; u.pitch=1.0;
  const sel=voices.find(v=>v.voiceURI===voiceSelect.value);
  if(sel) u.voice=sel;
  u.onend=cb;
  synth.speak(u);
}

/* ════════════════════════════════════════
   SENTENCES  — 防重複抽換
════════════════════════════════════════ */
// 從 pool 中挑 count 句，不和 history 中的 index 重複
// 若 pool 全部都已出現過，自動清空 history 重新開始
function pickUnique(pool, history, count, baseSeed) {
  // 若可用的不夠，清掉歷史讓它循環
  let available = pool.map((_,i)=>i).filter(i=>!history.includes(i));
  if(available.length < count) {
    history.length = 0;
    available = pool.map((_,i)=>i);
  }

  const picked = [];
  let seed = baseSeed;
  while(picked.length < count && available.length > 0) {
    const ri = Math.floor(seededRandom(seed++) * available.length);
    const idx = available[ri];
    picked.push(pool[idx]);
    history.push(idx);
    available.splice(ri, 1);
  }
  return picked;
}

function generateDailySentences(){
  const seed = new Date().getFullYear()*1000 + getDayOfYear() + seedOffset*37;
  dailySentences = pickUnique(mindfulnessPool, mindfulnessHistory, 10, seed);
}

// 情境對話：每個情境從自己的 pool 中各抽 2 句，不重複
let scenariosData = []; // 當前顯示的情境句子（動態生成）

function generateScenarios(){
  scenariosData = scenariosPool.map((cat, ci) => {
    if(!scenarioHistory[ci]) scenarioHistory[ci] = [];
    const seed = new Date().getFullYear()*10000 + getDayOfYear()*8 + ci*100 + scenarioSeedOffset*13;
    const picked = pickUnique(cat.sentences, scenarioHistory[ci], 2, seed);
    return { title: cat.title, titleEn: cat.titleEn, sentences: picked };
  });
}

function renderSentences(){
  sentenceListEl.innerHTML='';
  dailySentences.forEach((s,i)=>{
    const isPlaying = i===currentlyPlayingIndex;
    const row=document.createElement('div');
    row.className='sentence-row'+(isPlaying?' playing':'');
    row.id='sentence-'+i;
    row.innerHTML=`
      <span class="sentence-num">${i+1}.</span>
      <div class="sentence-text">
        <p class="sentence-main">${s.en}</p>
        ${!isEnglish ? `<p class="sentence-zh">${s.zh}</p>` : ''}
        <p class="sentence-phonetic${showPhonetics?' visible':''}">${isEnglish?s.ipa:s.pinyin}</p>
      </div>
      <button class="play-btn green" data-i="${i}" onclick="playSingleSentence(${i})">
        <svg class="flower-bg" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="pg" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#a8e6b0"/>
              <stop offset="100%" stop-color="#5a9e6e"/>
            </radialGradient>
          </defs>
          <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pg)" transform="rotate(0   21 21)"/>
          <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pg)" transform="rotate(72  21 21)"/>
          <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pg)" transform="rotate(144 21 21)"/>
          <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pg)" transform="rotate(216 21 21)"/>
          <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pg)" transform="rotate(288 21 21)"/>
          <circle cx="21" cy="21" r="7" fill="#fff" opacity="0.9"/>
        </svg>
        <span class="play-tri"></span>
      </button>`;
    if(isPlaying){
      const btn=row.querySelector('.play-btn');
      if(btn) btn.classList.add('spinning');
    }
    sentenceListEl.appendChild(row);
  });
}

function playSingleSentence(i){
  if(synth.speaking) synth.cancel();
  currentlyPlayingIndex=i; currentlyPlayingScenario=null;

  // 移除所有旋轉與情境高亮（直接操作 DOM）
  document.querySelectorAll('.play-btn.spinning').forEach(b=>b.classList.remove('spinning'));

  // 重渲染句子列表（更新高亮行）
  renderSentences();

  // 找到這顆按鈕並加旋轉
  const btn = document.querySelector(`.play-btn[data-i="${i}"]`);
  if(btn) btn.classList.add('spinning');

  speak(isEnglish?dailySentences[i].en:dailySentences[i].zh, ()=>{
    document.querySelectorAll('.play-btn.spinning').forEach(b=>b.classList.remove('spinning'));
    currentlyPlayingIndex=-1;
    renderSentences();
  });
}

/* ════════════════════════════════════════
   SCENARIOS
════════════════════════════════════════ */
function renderScenarios(){
  scenarioListEl.innerHTML='';
  scenariosData.forEach((cat,ci)=>{
    const wrap=document.createElement('div'); wrap.style.marginBottom='16px';

    // 標題：中文 + 英譯
    const titleEl=document.createElement('div'); titleEl.className='scenario-title';
    titleEl.innerHTML=`${cat.title} <span class="scenario-title-en">${cat.titleEn}</span>`;
    wrap.appendChild(titleEl);

    cat.sentences.forEach((s,si)=>{
      const isP=currentlyPlayingScenario&&currentlyPlayingScenario.ci===ci&&currentlyPlayingScenario.si===si;
      const row=document.createElement('div'); row.className='sentence-row'+(isP?' playing':'');
      row.innerHTML=`
        <span class="sentence-num">•</span>
        <div class="sentence-text">
          <p class="sentence-main">${s.en}</p>
          ${!isEnglish ? `<p class="sentence-zh">${s.zh}</p>` : ''}
          <p class="sentence-phonetic${showPhonetics?' visible':''}">${isEnglish?s.ipa:s.pinyin}</p>
        </div>
        <button class="play-btn blue" data-ci="${ci}" data-si="${si}" onclick="playScenarioSentence(${ci},${si})">
          <svg class="flower-bg" viewBox="0 0 42 42" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="pb" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#f9c8dc"/>
                <stop offset="100%" stop-color="#e06090"/>
              </radialGradient>
            </defs>
            <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pb)" transform="rotate(0   21 21)"/>
            <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pb)" transform="rotate(72  21 21)"/>
            <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pb)" transform="rotate(144 21 21)"/>
            <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pb)" transform="rotate(216 21 21)"/>
            <ellipse cx="21" cy="9"  rx="7" ry="9"  fill="url(#pb)" transform="rotate(288 21 21)"/>
            <circle cx="21" cy="21" r="7" fill="#fff" opacity="0.9"/>
          </svg>
          <span class="play-tri"></span>
        </button>`;
      if(isP){
        const btn=row.querySelector('.play-btn');
        if(btn) btn.classList.add('spinning');
      }
      wrap.appendChild(row);
    });
    scenarioListEl.appendChild(wrap);
  });
}

function playScenarioSentence(ci,si){
  if(synth.speaking) synth.cancel();
  currentlyPlayingScenario={ci,si}; currentlyPlayingIndex=-1;

  // 移除所有旋轉（直接操作 DOM，不重渲染）
  document.querySelectorAll('.play-btn.spinning').forEach(b=>b.classList.remove('spinning'));

  // 移除句子列表高亮
  document.querySelectorAll('.sentence-row.playing').forEach(r=>r.classList.remove('playing'));

  // 找到對應按鈕加旋轉
  const btn = document.querySelector(`.play-btn[data-ci="${ci}"][data-si="${si}"]`);
  if(btn) btn.classList.add('spinning');

  speak(isEnglish?scenariosData[ci].sentences[si].en:scenariosData[ci].sentences[si].zh, ()=>{
    // 播放完畢：只移除旋轉，完全不重渲染
    document.querySelectorAll('.play-btn.spinning').forEach(b=>b.classList.remove('spinning'));
    currentlyPlayingScenario=null;
  });
}

/* ════════════════════════════════════════
   PLAY ALL
════════════════════════════════════════ */
const PLAY_ICON='<svg width="15" height="15" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"/></svg><span>播放全文</span>';
const STOP_ICON='<svg width="15" height="15" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"/></svg><span>停止播放</span>';

playAllBtn.addEventListener('click',()=>{
  if(isPlayingAll||synth.speaking){
    synth.cancel(); isPlayingAll=false; currentlyPlayingIndex=-1;
    document.querySelectorAll('.play-btn.spinning').forEach(b=>b.classList.remove('spinning'));
    document.querySelectorAll('.sentence-row.playing').forEach(r=>r.classList.remove('playing'));
    playAllBtn.innerHTML=PLAY_ICON; return;
  }
  isPlayingAll=true; playAllBtn.innerHTML=STOP_ICON;
  let idx=0;
  (function next(){
    if(!isPlayingAll||idx>=dailySentences.length){
      isPlayingAll=false; currentlyPlayingIndex=-1;
      document.querySelectorAll('.play-btn.spinning').forEach(b=>b.classList.remove('spinning'));
      document.querySelectorAll('.sentence-row.playing').forEach(r=>r.classList.remove('playing'));
      playAllBtn.innerHTML=PLAY_ICON; return;
    }
    // 移除上一句的旋轉與高亮
    document.querySelectorAll('.play-btn.spinning').forEach(b=>b.classList.remove('spinning'));
    document.querySelectorAll('.sentence-row.playing').forEach(r=>r.classList.remove('playing'));

    // 加上這一句的高亮與旋轉
    currentlyPlayingIndex=idx;
    const row = $('sentence-'+idx);
    if(row){
      row.classList.add('playing');
      row.scrollIntoView({behavior:'smooth',block:'nearest'});
      const btn = row.querySelector('.play-btn');
      if(btn) btn.classList.add('spinning');
    }

    speak(isEnglish?dailySentences[idx].en:dailySentences[idx].zh, ()=>{
      idx++; setTimeout(next, 600);
    });
  })();
});

/* ════════════════════════════════════════
   CONTROLS
════════════════════════════════════════ */
langToggleBtn.addEventListener('click',()=>{
  isEnglish=!isEnglish;
  langLabel.textContent=isEnglish?'切換中文':'隱藏中文';
  if(synth.speaking)synth.cancel(); filterVoices(); renderSentences(); renderScenarios();
});

phoneticToggleBtn.addEventListener('click',()=>{
  showPhonetics=!showPhonetics; phoneticLabel.textContent=showPhonetics?'隱藏音標':'顯示音標';
  renderSentences(); renderScenarios();
});

regenerateBtn.addEventListener('click',()=>{
  seedOffset+=1; if(synth.speaking)synth.cancel(); isPlayingAll=false; currentlyPlayingIndex=-1;
  playAllBtn.innerHTML=PLAY_ICON;
  generateDailySentences(); renderSentences();
  showToast('已為您重新挑選 10 句靜心語錄 ✨');
});

regenScenarioBtn.addEventListener('click',()=>{
  scenarioSeedOffset+=1; if(synth.speaking)synth.cancel(); currentlyPlayingScenario=null;
  generateScenarios(); renderScenarios();
  showToast('已為您重新挑選情境對話句子 🎀');
});

/* ════════════════════════════════════════
   TRACKER
════════════════════════════════════════ */
let checkedInDays=new Set(), trackerStartDate='';

function loadTrackerData(){
  const sd=localStorage.getItem('felt_start_date');
  trackerStartDate=sd||getTodayString();
  if(!sd)localStorage.setItem('felt_start_date',trackerStartDate);
  startDatePicker.value=trackerStartDate;
  const sc=localStorage.getItem('felt_checkins');
  checkedInDays=sc?new Set(JSON.parse(sc)):new Set();
}
function saveTrackerData(){localStorage.setItem('felt_start_date',trackerStartDate);localStorage.setItem('felt_checkins',JSON.stringify([...checkedInDays]));}

function initTracker(){
  checkinContainer.innerHTML='';
  const td=getDaysDiff(trackerStartDate,getTodayString());
  for(let i=0;i<365;i++){
    const d=document.createElement('div'); d.classList.add('dot'); d.dataset.dayIndex=i;
    if(checkedInDays.has(i))d.classList.add('done');
    if(i===td){d.classList.add('today');setTimeout(()=>d.scrollIntoView({behavior:'smooth',block:'nearest'}),100);}
    checkinContainer.appendChild(d);
  }
  updateStreak(); checkTodayBtn();
}
function updateStreak(){streakCount.textContent=`已打卡: ${checkedInDays.size} 天`;}
function checkTodayBtn(){
  const d=getDaysDiff(trackerStartDate,getTodayString());
  if(d>=0&&d<365&&checkedInDays.has(d)){
    checkinBtn.innerHTML='✨ 今日已打卡 ✨'; checkinBtn.classList.add('done');
  } else {
    checkinBtn.innerHTML='<svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg> 完成今日練習';
    checkinBtn.classList.remove('done');
  }
}

checkinBtn.addEventListener('click',()=>{
  const d=getDaysDiff(trackerStartDate,getTodayString());
  if(d<0||d>=365){showToast('今天不在打卡區間內喔！');return;}
  if(checkedInDays.has(d)){showToast('今天已經打卡過囉！你很棒！');return;}
  const dot=document.querySelector(`.dot[data-day-index="${d}"]`);
  if(dot){dot.classList.add('done');dot.animate([{transform:'scale(1)'},{transform:'scale(1.6)'},{transform:'scale(1.25)'}],{duration:420,easing:'ease-out'});}
  checkedInDays.add(d); saveTrackerData(); updateStreak(); checkTodayBtn();
  showToast('今日練習完成！太棒了！🌸');
});

startDatePicker.addEventListener('change',e=>{trackerStartDate=e.target.value;saveTrackerData();initTracker();showToast('已更新起始日期！');});
resetTrackerBtn.addEventListener('click',()=>{
  if(confirm('確定要清除所有打卡紀錄並重新開始嗎？')){
    checkedInDays.clear(); trackerStartDate=getTodayString();
    startDatePicker.value=trackerStartDate; saveTrackerData(); initTracker();
    showToast('已為您重新開始打卡計畫！');
  }
});

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
loadTrackerData();
generateDailySentences();
generateScenarios();
renderSentences();
renderScenarios();
initTracker();
setTimeout(()=>{if(!voices.length)populateVoices();},800);
</script>
